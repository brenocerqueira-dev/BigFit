<div class="dashboard-layout">
  <aside class="sidebar" [class.aberto]="menuAberto">
    <div class="brand">
      <div class="brand-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#000"
          stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
        </svg>
      </div>
      <h2 class="brand-name">BIGFIT</h2>

      <button class="btn-fechar-mobile" (click)="toggleMenu()">✕</button>
    </div>

    <nav class="menu">
      <a routerLink="/admin/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}"
        (click)="toggleMenu()">Dashboard</a>
      <a routerLink="/admin/alunos" routerLinkActive="active" (click)="toggleMenu()">Alunos</a>
      <a routerLink="/admin/treinos" routerLinkActive="active" (click)="toggleMenu()">Treinos</a>
      <a routerLink="/admin/planos" routerLinkActive="active" (click)="toggleMenu()">Planos</a>
    </nav>

    <div class="logout-container">
      <button class="btn-logout" (click)="logout()">Sair do Sistema</button>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <button class="btn-menu-admin" (click)="toggleMenu()">
        <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>

      <div class="header-titles">
        <h1 class="page-title">Olá, <span class="highlight">{{ adminNome }}</span>!</h1>
        <p class="page-subtitle">Bem-vindo ao painel de controle da BigFit.</p>
      </div>
    </header>

    <div class="stats-grid">
      <div class="stat-card glass-card">
        <h3 class="card-label">Total de Alunos</h3>
        <p class="stat-value">{{ totalAlunos }}</p>
      </div>

      <div class="stat-card glass-card">
        <h3 class="card-label">Receita Bruta</h3>
        <p class="stat-value"><span class="currency">R$</span> {{ receitaMes }},00</p>
      </div>
    </div>
  </main>
</div>
